<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ΑΣΟΠ ΔΙΑΣ{% endblock %}</title>
  <style>
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary-2);
      box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.10);
    }

    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --primary: #123b7a;
      --primary-2: #1f5fbf;
      --accent: #f28c28;
      --text: #172033;
      --muted: #667085;
      --border: #e6eaf2;
      --shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
      --radius: 18px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d9e2f0;
      border-radius: 12px;
      font-size: 15px;
      background: white;
      color: var(--text);
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary-2);
      box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #eef3fb 0%, #f7f9fc 100%);
      color: var(--text);
    }

    .topbar {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
      color: white;
      padding: 18px 0;
      box-shadow: var(--shadow);
    }

    .container {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: rgba(255,255,255,0.16);
      display: grid;
      place-items: center;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
    }

    .brand p {
      margin: 2px 0 0;
      opacity: 0.9;
      font-size: 14px;
    }

    .hero {
      padding: 44px 0 26px;
    }

    .hero-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px;
      box-shadow: var(--shadow);
    }

    .hero-card h2 {
      margin: 0 0 10px;
      font-size: 40px;
      line-height: 1.1;
      color: var(--primary);
    }

    .hero-card p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 22px;
      padding-bottom: 40px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eaf2ff;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 28px;
      color: var(--text);
    }

    .card p {
      color: var(--muted);
      line-height: 1.6;
    }

    .meta {
      margin: 18px 0;
      padding: 0;
      list-style: none;
      color: #344054;
    }

    .meta li {
      padding: 7px 0;
      border-bottom: 1px solid #f0f2f7;
    }

    .meta li:last-child {
      border-bottom: 0;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: var(--accent);
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      margin-top: 8px;
      transition: transform .15s ease, opacity .15s ease;
    }

    .btn:hover {
      opacity: .95;
      transform: translateY(-1px);
    }

    .detail-wrap {
      padding: 34px 0 50px;
    }

    .detail-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 34px;
      box-shadow: var(--shadow);
    }

    .detail-card h2 {
      margin: 0 0 12px;
      font-size: 38px;
      color: var(--primary);
    }

    .detail-card .desc {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .back {
      display: inline-block;
      margin-top: 20px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .empty {
      background: white;
      border: 1px dashed #cfd8e6;
      border-radius: 16px;
      padding: 28px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .hero-card h2 { font-size: 30px; }
      .detail-card h2 { font-size: 30px; }
      .hero-card, .detail-card, .card { padding: 24px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">

      <div class="brand">
        <div class="logo">ΑΣ</div>
        <div>
          <h1>ΑΣΟΠ ΔΙΑΣ</h1>
          <p>Online δήλωση συμμετοχής σε τουρνουά σκακιού</p>
        </div>
      </div>

      <div style="display:flex; gap:12px; align-items:center;">
  <a href="{% url 'tournament_list' %}"
     style="color:white; text-decoration:none; font-weight:600;">
    Τουρνουά
  </a>
</div>

        <a href="/trainings/"
           style="color:white; text-decoration:none; font-weight:600;">
          Προπονήσεις
        </a>

        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}"
             style="color:white; text-decoration:none; font-weight:600;">
            Profile
          </a>

          <span style="color:white;">
            Γεια σου, {{ user.first_name|default:user.username }}
          </span>

          <form method="post" action="{% url 'logout' %}" style="margin:0;">
            {% csrf_token %}
            <button type="submit"
              style="background:white; color:var(--primary); border:0; padding:10px 14px; border-radius:10px; font-weight:600; cursor:pointer;">
              Αποσύνδεση
            </button>
          </form>
        {% else %}
          <a href="{% url 'login' %}"
             style="color:white; text-decoration:none; font-weight:600;">
            Σύνδεση
          </a>

          <a href="{% url 'signup' %}"
             style="background:white; color:var(--primary); text-decoration:none; padding:10px 14px; border-radius:10px; font-weight:700;">
            Εγγραφή
          </a>
        {% endif %}
      </div>

    </div>
  </header>

  {% block content %}{% endblock %}
</body>
</html>
